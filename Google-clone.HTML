<!DOCTYPE html>
<html>
<head>
    <title>Google Clone</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 120px;
        }

        h1 {
            font-size: 70px;
            color: #4285f4;
        }

        input {
            width: 400px;
            padding: 12px;
            border-radius: 25px;
            border: 1px solid gray;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: #f2f2f2;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>Google</h1>

    <input type="text" placeholder="Search Google or type a URL">

    <br>

    <button>Google Search</button>
    <button>I'm Feeling Lucky</button>

</body>
</html>
